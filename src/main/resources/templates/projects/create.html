<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Create Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Create Project</h2>

    <form th:action="@{/web/projects/create}"
          th:object="${project}"
          method="post">

        <div class="mb-3">
            <label class="form-label">Client</label>
            <select th:field="*{client.id}" class="form-select" required>
                <option value="">-- Select client --</option>
                <option th:each="client : ${clients}"
                        th:value="${client.id}"
                        th:text="${client.firstName + ' ' + client.lastName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" th:field="*{title}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Budget</label>
            <input type="number" step="0.01" min="0" th:field="*{budget}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <select th:field="*{category.id}" class="form-select" required>
                <option value="">-- Select category --</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                </option>
            </select>
        </div>

        <button class="btn btn-success">Save</button>
        <a href="/web/projects" class="btn btn-secondary">Nazad</a>

    </form>

</div>
</body>
</html>
