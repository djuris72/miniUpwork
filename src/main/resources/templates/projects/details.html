<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Project Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2 th:text="${project.title}"></h2>

    <div class="card mb-4">
        <div class="card-body">
            <p><strong>Description:</strong> <span th:text="${project.description}"></span></p>
            <p><strong>Budget:</strong> <span th:text="${project.budget}"></span></p>
            <p><strong>Status:</strong> <span th:text="${project.status}"></span></p>
            <p><strong>Category:</strong> <span th:text="${project.category.name}"></span></p>
            <p><strong>Client:</strong>
                <span th:text="${project.client.firstName + ' ' + project.client.lastName}"></span>
            </p>
            <p th:if="${project.assignedFreelancer != null}">
                <strong>Assigned freelancer:</strong>
                <span th:text="${project.assignedFreelancer.firstName + ' ' + project.assignedFreelancer.lastName}"></span>
            </p>
            <p th:if="${project.createdAt != null}">
                <strong>Created:</strong>
                <span th:text="${#temporals.format(project.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
            </p>
        </div>
    </div>

    <div class="mb-3">
        <form th:if="${project.status == T(rs.ac.singidunum.miniUpwork.enums.ProjectStatus).IN_PROGRESS}"
              th:action="@{/web/projects/{id}/complete(id=${project.id})}"
              method="post" style="display:inline;">
            <button class="btn btn-success">Mark Completed</button>
        </form>

        <form th:if="${project.status != T(rs.ac.singidunum.miniUpwork.enums.ProjectStatus).COMPLETED
                      and project.status != T(rs.ac.singidunum.miniUpwork.enums.ProjectStatus).CANCELLED}"
              th:action="@{/web/projects/{id}/cancel(id=${project.id})}"
              method="post" style="display:inline;">
            <button class="btn btn-secondary">Cancel Project</button>
        </form>

        <a href="/web/projects" class="btn btn-outline-secondary">Nazad</a>
    </div>

    <h4>Proposals</h4>

    <p th:if="${#lists.isEmpty(proposals)}" class="text-muted">
        Nema ponuda za ovaj projekat.
    </p>

    <table th:if="${!#lists.isEmpty(proposals)}" class="table table-bordered">
        <thead>
        <tr>
            <th>Freelancer</th>
            <th>Price</th>
            <th>Status</th>
            <th>Message</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="proposal : ${proposals}">
            <td th:text="${proposal.freelancer.firstName + ' ' + proposal.freelancer.lastName}"></td>
            <td th:text="${proposal.price}"></td>
            <td th:text="${proposal.status}"></td>
            <td th:text="${proposal.message}"></td>
        </tr>
        </tbody>
    </table>

    <p class="text-muted" th:if="${project.status == T(rs.ac.singidunum.miniUpwork.enums.ProjectStatus).OPEN}">
        Prihvatanje i odbijanje ponuda vrši se na stranici
        <a href="/web/proposals">Proposals</a>.
    </p>

</div>
</body>
</html>
