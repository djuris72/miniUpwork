<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Create Project</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Create Project</h2>

    <form th:action="@{/web/projects/edit/{id}(id=${project.id})}"
      th:object="${project}"
      method="post">

        <div class="mb-3">

            <label class="form-label">

                Title

            </label>

            <input type="text"
                   th:field="*{title}"
                   class="form-control">

        </div>

        <div class="mb-3">

            <label class="form-label">

                Description

            </label>

            <textarea
                    th:field="*{description}"
                    class="form-control">

            </textarea>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Budget

            </label>

            <input type="number"
                   th:field="*{budget}"
                   class="form-control">

        </div>

        <div class="mb-3">

            <label class="form-label">

                Category

            </label>

            <select th:field="*{category.id}"
                    class="form-select">

                <option
                        th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                </option>

            </select>

        </div>

        <button class="btn btn-success">
            Save
        </button>

    </form>

</div>

</body>
</html>
