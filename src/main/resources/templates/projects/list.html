<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Projects</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Projects</h2>

    <a href="/web/projects/create"
       class="btn btn-primary mb-3">

        Create Project

    </a>

    <table class="table table-bordered">

        <thead>

        <tr>
            <th>ID</th>
            
            <th>Title</th>
            <th>Budget</th>
            <th>Status</th>
            <th>Category</th>
            <th>Actions</th>
            	
        </tr>

        </thead>

        <tbody>

        <tr th:each="project : ${projects}">

            <td th:text="${project.id}"></td>

            <td th:text="${project.title}"></td>

            <td th:text="${project.budget}"></td>

            <td th:text="${project.status}"></td>

            <td th:text="${project.category.name}"></td>
            
            <td>

    <a th:href="@{/web/projects/{id}(id=${project.id})}"
       class="btn btn-info btn-sm">

        Details

    </a>

    <a th:href="@{/web/projects/edit/{id}(id=${project.id})}"
       class="btn btn-warning btn-sm">

        Edit

    </a>

    <form
            th:action="@{/web/projects/delete/{id}(id=${project.id})}"
            method="post"
            style="display:inline;">

        <button
                class="btn btn-danger btn-sm">

            Delete

        </button>

    </form>

</td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
