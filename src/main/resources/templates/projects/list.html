<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Projects</h2>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="/web/projects/create" class="btn btn-primary">
            Create Project
        </a>

        <form th:action="@{/web/projects}" method="get" class="d-flex gap-2">
            <input type="text" name="search" class="form-control"
                   placeholder="Search by title..."
                   th:value="${search}">
            <button class="btn btn-outline-secondary">Search</button>
        </form>
    </div>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Client</th>
            <th>Budget</th>
            <th>Status</th>
            <th>Category</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="project : ${projects}">
            <td th:text="${project.id}"></td>
            <td th:text="${project.title}"></td>
            <td th:text="${project.client.firstName + ' ' + project.client.lastName}"></td>
            <td th:text="${project.budget}"></td>
            <td th:text="${project.status}"></td>
            <td th:text="${project.category.name}"></td>
            <td>
                <a th:href="@{/web/projects/{id}(id=${project.id})}"
                   class="btn btn-info btn-sm">Details</a>

                <a th:href="@{/web/projects/edit/{id}(id=${project.id})}"
                   class="btn btn-warning btn-sm">Edit</a>

                <form th:if="${project.status == T(rs.ac.singidunum.miniUpwork.enums.ProjectStatus).IN_PROGRESS}"
                      th:action="@{/web/projects/{id}/complete(id=${project.id})}"
                      method="post" style="display:inline;">
                    <button class="btn btn-success btn-sm">Complete</button>
                </form>

                <form th:if="${project.status != T(rs.ac.singidunum.miniUpwork.enums.ProjectStatus).COMPLETED
                              and project.status != T(rs.ac.singidunum.miniUpwork.enums.ProjectStatus).CANCELLED}"
                      th:action="@{/web/projects/{id}/cancel(id=${project.id})}"
                      method="post" style="display:inline;">
                    <button class="btn btn-secondary btn-sm">Cancel</button>
                </form>

                <form th:action="@{/web/projects/delete/{id}(id=${project.id})}"
                      method="post" style="display:inline;">
                    <button class="btn btn-danger btn-sm">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">Nazad</a>

</div>
</body>
</html>
