<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Create Proposal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Create Proposal</h2>

    <p class="text-muted">
        Ponuda se može poslati samo na otvorene projekte (OPEN), od strane freelancera.
    </p>

    <div th:if="${#lists.isEmpty(projects)}" class="alert alert-warning">
        Nema otvorenih projekata. Prvo kreirajte projekat.
    </div>

    <div th:if="${#lists.isEmpty(freelancers)}" class="alert alert-warning">
        Nema registrovanih freelancera. Prvo kreirajte korisnika sa ulogom FREELANCER.
    </div>

    <form th:action="@{/web/proposals/create}"
          th:object="${proposal}"
          method="post"
          th:if="${!#lists.isEmpty(projects) and !#lists.isEmpty(freelancers)}">

        <div class="mb-3">
            <label class="form-label">Project</label>
            <select th:field="*{project.id}" class="form-select" required>
                <option value="">-- Select project --</option>
                <option th:each="project : ${projects}"
                        th:value="${project.id}"
                        th:text="${project.title}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Freelancer</label>
            <select th:field="*{freelancer.id}" class="form-select" required>
                <option value="">-- Select freelancer --</option>
                <option th:each="freelancer : ${freelancers}"
                        th:value="${freelancer.id}"
                        th:text="${freelancer.firstName + ' ' + freelancer.lastName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" step="0.01" min="0" th:field="*{price}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea th:field="*{message}" class="form-control" required></textarea>
        </div>

        <button class="btn btn-success">Save</button>
        <a href="/web/proposals" class="btn btn-secondary">Nazad</a>

    </form>

</div>
</body>
</html>
