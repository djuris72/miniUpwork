<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Proposal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Edit Proposal</h2>

    <form
            th:action="@{/web/proposals/edit/{id}(id=${proposal.id})}"
            th:object="${proposal}"
            method="post">

        <div class="mb-3">
            <label class="form-label">Project</label>
            <input type="text"
                   class="form-control"
                   th:value="${proposal.project.title}"
                   disabled>
        </div>

        <div class="mb-3">
            <label class="form-label">Freelancer</label>
            <input type="text"
                   class="form-control"
                   th:value="${proposal.freelancer.firstName + ' ' + proposal.freelancer.lastName}"
                   disabled>
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <input
                    type="number"
                    th:field="*{price}"
                    class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea
                    th:field="*{message}"
                    class="form-control">
            </textarea>
        </div>

        <button class="btn btn-success">
            Save
        </button>

        <div class="mt-3">
            <a href="/web/proposals"
               class="btn btn-secondary">
                Nazad
            </a>
        </div>

    </form>

</div>
</body>
</html>
