

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Proposals</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h2>Proposals</h2>

<a href="/web/proposals/create"
   class="btn btn-primary mb-3">

    Create Proposal

</a>

<table class="table table-bordered">

    <tr>
        <th>ID</th>
        <th>Project</th>
        <th>Freelancer</th>
        <th>Price</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>

    <tr th:each="proposal : ${proposals}">

        <td th:text="${proposal.id}"></td>

        <td th:text="${proposal.project.title}"></td>

        <td th:text="${proposal.freelancer.firstName}"></td>

        <td th:text="${proposal.price}"></td>

        <td th:text="${proposal.status}"></td>

        <td>

            <form
                    th:action="@{/web/proposals/accept/{id}(id=${proposal.id})}"
                    method="post">

                <button
                        class="btn btn-success btn-sm">

                    Accept

                </button>

            </form>

        </td>

    </tr>

</table>

</body>
</html>
