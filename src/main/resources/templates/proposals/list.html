<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Proposals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Proposals</h2>

    <a href="/web/proposals/create" class="btn btn-primary mb-3">
        Create Proposal
    </a>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Project</th>
            <th>Freelancer</th>
            <th>Price</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="proposal : ${proposals}">
            <td th:text="${proposal.id}"></td>
            <td th:text="${proposal.project.title}"></td>
            <td>
                <span th:text="${proposal.freelancer.firstName + ' ' + proposal.freelancer.lastName}"></span>
                <div th:if="${!#lists.isEmpty(proposal.freelancer.skills)}">
                    <span th:each="skill : ${proposal.freelancer.skills}"
                          class="badge bg-secondary me-1"
                          th:text="${skill.name}">
                    </span>
                </div>
            </td>
            <td th:text="${proposal.price}"></td>
            <td th:text="${proposal.status}"></td>
            <td>
                <a th:if="${proposal.status == T(rs.ac.singidunum.miniUpwork.enums.ProposalStatus).PENDING}"
                   th:href="@{/web/proposals/edit/{id}(id=${proposal.id})}"
                   class="btn btn-warning btn-sm">Edit</a>

                <form th:if="${proposal.status == T(rs.ac.singidunum.miniUpwork.enums.ProposalStatus).PENDING}"
                      th:action="@{/web/proposals/accept/{id}(id=${proposal.id})}"
                      method="post" style="display:inline;">
                    <button class="btn btn-success btn-sm">Accept</button>
                </form>

                <form th:if="${proposal.status == T(rs.ac.singidunum.miniUpwork.enums.ProposalStatus).PENDING}"
                      th:action="@{/web/proposals/reject/{id}(id=${proposal.id})}"
                      method="post" style="display:inline;">
                    <button class="btn btn-danger btn-sm">Reject</button>
                </form>

                <form th:if="${proposal.status != T(rs.ac.singidunum.miniUpwork.enums.ProposalStatus).ACCEPTED}"
                      th:action="@{/web/proposals/delete/{id}(id=${proposal.id})}"
                      method="post" style="display:inline;">
                    <button class="btn btn-outline-danger btn-sm">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">Nazad</a>

</div>
</body>
</html>
