<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Create Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Create Review</h2>

    <p class="text-muted">
        Recenziju možete ostaviti samo za završene projekte bez postojeće recenzije.
        Klijent automatski ocenjuje dodeljenog freelancera.
    </p>

    <div th:if="${#lists.isEmpty(projects)}" class="alert alert-warning">
        Nema projekata spremnih za recenziju. Projekat mora biti COMPLETED i imati dodeljenog freelancera.
    </div>

    <form th:action="@{/web/reviews/create}"
          th:object="${review}"
          method="post"
          th:if="${!#lists.isEmpty(projects)}">

        <div class="mb-3">
            <label class="form-label">Project</label>
            <select th:field="*{project.id}" class="form-select" required>
                <option value="">-- Select project --</option>
                <option th:each="project : ${projects}"
                        th:value="${project.id}"
                        th:text="${project.title + ' (' + project.assignedFreelancer.firstName + ' ' + project.assignedFreelancer.lastName + ')'}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Rating (1-5)</label>
            <input type="number" min="1" max="5" th:field="*{rating}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Comment</label>
            <textarea th:field="*{comment}" class="form-control"></textarea>
        </div>

        <button class="btn btn-success">Save</button>
        <a href="/web/reviews" class="btn btn-secondary">Nazad</a>

    </form>

</div>
</body>
</html>
