<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Review</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Edit Review</h2>

    <form
            th:action="@{/web/reviews/edit/{id}(id=${review.id})}"
            th:object="${review}"
            method="post">

        <div class="mb-3">
            <label class="form-label">Project</label>
            <input type="text"
                   class="form-control"
                   th:value="${review.project.title}"
                   disabled>
        </div>

        <div class="mb-3">
            <label class="form-label">Rating</label>
            <input
                    type="number"
                    min="1"
                    max="5"
                    th:field="*{rating}"
                    class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Comment</label>
            <textarea
                    th:field="*{comment}"
                    class="form-control">
            </textarea>
        </div>

        <button class="btn btn-success">
            Save
        </button>

        <div class="mt-3">
            <a href="/web/reviews"
               class="btn btn-secondary">
                Nazad
            </a>
        </div>

    </form>

</div>
</body>
</html>
