<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Reviews</h2>

    <a href="/web/reviews/create" class="btn btn-primary mb-3">
        Create Review
    </a>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Project</th>
            <th>Reviewer (Client)</th>
            <th>Reviewed (Freelancer)</th>
            <th>Rating</th>
            <th>Comment</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="review : ${reviews}">
            <td th:text="${review.id}"></td>
            <td th:text="${review.project.title}"></td>
            <td th:text="${review.reviewer.firstName + ' ' + review.reviewer.lastName}"></td>
            <td th:text="${review.reviewedUser.firstName + ' ' + review.reviewedUser.lastName}"></td>
            <td th:text="${review.rating}"></td>
            <td th:text="${review.comment}"></td>
            <td>
                <a th:href="@{/web/reviews/edit/{id}(id=${review.id})}"
                   class="btn btn-warning btn-sm">Edit</a>

                <form th:action="@{/web/reviews/delete/{id}(id=${review.id})}"
                      method="post" style="display:inline;">
                    <button class="btn btn-danger btn-sm">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">Nazad</a>

</div>
</body>
</html>
