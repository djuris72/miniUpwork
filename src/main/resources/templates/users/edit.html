<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Edit User</h2>

    <form th:action="@{/web/users/edit/{id}(id=${user.id})}"
          th:object="${user}"
          method="post">

        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" th:field="*{firstName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" th:field="*{lastName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Role</label>
            <select th:field="*{role}" class="form-select" required>
                <option th:each="r : ${roles}"
                        th:value="${r}"
                        th:text="${r}">
                </option>
            </select>
        </div>

        <div th:if="${user.role == T(rs.ac.singidunum.miniUpwork.enums.Role).FREELANCER}"
             class="mb-3">
            <label class="form-label">Skills</label>
            <div th:if="${#lists.isEmpty(allSkills)}" class="text-muted">
                Nema definisanih veština u bazi.
            </div>
            <div th:each="skill : ${allSkills}" class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{skills}"
                       th:value="${skill.id}"
                       th:id="${'skill-' + skill.id}">
                <label class="form-check-label"
                       th:for="${'skill-' + skill.id}"
                       th:text="${skill.name}">
                </label>
            </div>
        </div>

        <button class="btn btn-success">Save</button>
        <a href="/web/users" class="btn btn-secondary">Nazad</a>

    </form>

</div>
</body>
</html>
