<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Users</h2>

    <p class="text-muted">
        Korisnici imaju ulogu CLIENT (objavljuje projekte) ili FREELANCER (šalje ponude).
        Veštine se prikazuju i dodeljuju samo freelancerima.
    </p>

    <a href="/web/users/create" class="btn btn-primary mb-3">
        Create User
    </a>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Skills</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.firstName + ' ' + user.lastName}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.role}"></td>
            <td>
                <span th:if="${user.role == T(rs.ac.singidunum.miniUpwork.enums.Role).FREELANCER
                              and !#lists.isEmpty(user.skills)}"
                      th:each="skill : ${user.skills}"
                      class="badge bg-primary me-1"
                      th:text="${skill.name}">
                </span>
                <span th:if="${user.role == T(rs.ac.singidunum.miniUpwork.enums.Role).FREELANCER
                              and #lists.isEmpty(user.skills)}"
                      class="text-muted">
                    —
                </span>
                <span th:if="${user.role == T(rs.ac.singidunum.miniUpwork.enums.Role).CLIENT}"
                      class="text-muted">
                    N/A
                </span>
            </td>
            <td>
                <a th:href="@{/web/users/edit/{id}(id=${user.id})}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>
                <form th:action="@{/web/users/delete/{id}(id=${user.id})}"
                      method="post"
                      style="display:inline;">
                    <button class="btn btn-danger btn-sm">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">Nazad</a>

</div>
</body>
</html>
